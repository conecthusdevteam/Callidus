services:
  api:
    build: .
    container_name: cautela-api
    env_file:
      - .env
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev
    depends_on:
      - sqlserver

  seed:
    build: .
    container_name: cautela-seed
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run seed
    restart: on-failure
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cautela-sqlserver
    ports:
      - '1433:1433'
    environment:
      ACCEPT_EULA: 'Y'
      SA_PASSWORD: 'SecurePassword123!'
      MSSQL_PID: 'Developer'
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data:
